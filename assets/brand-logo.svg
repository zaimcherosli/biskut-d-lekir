<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Gold outer ring -->
  <circle cx="50" cy="50" r="46" fill="#78350F" stroke="#FBBF24" stroke-width="3" />
  <circle cx="50" cy="50" r="39" fill="none" stroke="#FBBF24" stroke-dasharray="2,2" stroke-width="1.2" />
  <path d="M 50,15 C 40,25 40,45 50,55 C 60,45 60,25 50,15 Z" fill="#FBBF24" opacity="0.15"/>
  
  <!-- Wheat / Rice husk stalks -->
  <g stroke="#FBBF24" stroke-width="1.8" fill="none" stroke-linecap="round">
    <!-- Left Stalk -->
    <path d="M 32,70 C 23,61 23,39 32,30" />
    <path d="M 32,30 L 27,25" /><path d="M 30.5,39 L 24.5,35" /><path d="M 29.5,48 L 23.5,45" /><path d="M 29.5,57 L 23.5,55" /><path d="M 31,66 L 25,65" />
    <!-- Right Stalk -->
    <path d="M 68,70 C 77,61 77,39 68,30" />
    <path d="M 68,30 L 73,25" /><path d="M 69.5,39 L 75.5,35" /><path d="M 70.5,48 L 76.5,45" /><path d="M 70.5,57 L 76.5,55" /><path d="M 69,66 L 75,65" />
  </g>
  
  <!-- Text inside LDR -->
  <text x="50" y="47" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="16" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">LDR</text>
  
  <!-- Ribbon banner -->
  <path d="M 18,63 L 82,63 L 76,73 L 24,73 Z" fill="#EA580C" stroke="#FBBF24" stroke-width="1.5" stroke-linejoin="round" />
  <text x="50" y="70.5" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="7.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">LEKIR</text>
  <text x="50" y="87" font-family="'Outfit', 'Inter', sans-serif" font-weight="700" font-size="5" fill="#FBBF24" text-anchor="middle" letter-spacing="1">SUCI &amp; BERMUTU</text>
</svg>
